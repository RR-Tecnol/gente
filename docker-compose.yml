services:

  # ── Aplicação Laravel ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gente_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
      - gente_bootstrap_cache:/var/www/bootstrap/cache
      - gente_storage_framework:/var/www/storage/framework
    environment:
      - APP_ENV=local
      - APP_KEY=${APP_KEY}
      - APP_URL=http://localhost
      - DB_CONNECTION=sqlsrv
      - DB_HOST=sqlserver
      - DB_PORT=1433
      - DB_DATABASE=${DB_DATABASE:-gente}
      - DB_USERNAME=${DB_USERNAME:-sa}
      - DB_PASSWORD=${DB_PASSWORD:-Gente@2024}
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - gente_net

  # ── Nginx ──────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: gente_nginx
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/gente.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - gente_net

  # ── SQL Server Express ─────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: gente_sqlserver
    restart: unless-stopped
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD:-Gente@2024}
      - MSSQL_PID=Express
    volumes:
      - gente_sqldata:/var/opt/mssql
    healthcheck:
      test: [ "CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${DB_PASSWORD:-Gente@2024} -Q 'SELECT 1' -No || exit 1" ]
      interval: 15s
      retries: 10
      start_period: 60s
      timeout: 10s
    networks:
      - gente_net

volumes:
  gente_sqldata:
    driver: local
  gente_bootstrap_cache:
    driver: local
  gente_storage_framework:
    driver: local

networks:
  gente_net:
    driver: bridge
